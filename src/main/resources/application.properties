# Spring Boot automatically uses the DATABASE_URL environment variable from Render
# to configure the data source, so you don't need to set the URL, username, or password here.

# This sets the hibernate ddl-auto property. 'update' will update the schema if needed.
spring.jpa.hibernate.ddl-auto=update

# Render provides the port to use via the PORT environment variable.
# This tells Spring Boot to use that port, defaulting to 8080 if not set.
server.port=${PORT:8080}